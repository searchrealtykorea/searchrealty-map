<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>써치리얼티 거래사례 지도 v16</title>
<style>
html, body { width:100%; height:100%; margin:0; padding:0; font-family:Arial, sans-serif; }
#wrap { display:flex; width:100%; height:100%; }
#list {
    width:330px; height:100%; overflow-y:auto;
    border-right:1px solid #ccc;
    background:#f8f8f8;
    padding:10px;
    box-sizing:border-box;
}
#map { flex:1; height:100%; }

.item {
    background:white;
    border:1px solid #ddd;
    border-radius:6px;
    padding:9px;
    margin-bottom:8px;
    cursor:pointer;
    font-size:13px;
}

.item:hover { background:#eaf3ff; }
.item-title { font-weight:bold; margin-bottom:4px; }
.item-fail { color:#c00000; font-size:12px; margin-top:4px; }
.info-window { font-size:13px; line-height:1.5; padding:6px; }

.price-label {
    position:relative;
    background:white;
    border:1px solid #b8b8d8;
    border-radius:18px;
    padding:6px 12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.25);
    text-align:center;
    cursor:pointer;
    transform:translate(-50%, -100%);
}

.price {
    color:#5b55ff;
    font-size:20px;
    font-weight:bold;
}

.date {
    color:#555;
    font-size:15px;
    font-weight:bold;
}

.price-label:after {
    content:"";
    position:absolute;
    left:50%;
    bottom:-8px;
    transform:translateX(-50%);
    border-left:7px solid transparent;
    border-right:7px solid transparent;
    border-top:9px solid white;
}
</style>

<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=37a7f5faa819d54cc945a408dbb82f69&libraries=services"></script>
</head>

<body>
<div id="wrap">
    <div id="list"><h3>거래사례 목록</h3></div>
    <div id="map"></div>
</div>

<script>
const map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.501274, 127.039585),
    level: 5
});

const geocoder = new kakao.maps.services.Geocoder();
const listBox = document.getElementById('list');

let currentInfoWindow = null;
let currentCircle = null;

function csvToRows(text) {
    return text.trim().split('\n').map(row => row.split(','));
}

function parseCSV(text) {
    const rows = csvToRows(text);
    const headers = rows[0];

    return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h.trim()] = row[i] ? row[i].trim() : '');
        return obj;
    });
}

function shortDate(value) {
    if (!value) return "";
    const parts = value.split(".");
    return "'" + parts[0].slice(-2) + "." + parts[1];
}

function makeInfoContent(item) {
    return `
    <div class="info-window">
        <strong>${item["건물명/사례명"]}</strong><br>
        주소: ${item["지번주소"]}<br>
        용도: ${item["용도"]}<br>
        매매년월: ${item["매매년월"]}<br>
        매매금액: ${item["매매금액(억원)"]}억원
    </div>`;
}

function createListItem(item, index) {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = `
        <div class="item-title">${index+1}. ${item["건물명/사례명"]}</div>
        <div>${item["지번주소"]}</div>
        <div>${item["매매금액(억원)"]}억원 / ${item["매매년월"]}</div>
    `;
    listBox.appendChild(div);
    return div;
}

function addMapObject(item, position, listItem) {
    const marker = new kakao.maps.Marker({
        map: map,
        position: position,
        opacity: 0
    });

    const content = document.createElement("div");
    content.className = "price-label";
    content.innerHTML = `
        <div class="price">${item["매매금액(억원)"]}억</div>
        <div class="date">${shortDate(item["매매년월"])}</div>
    `;

    const overlay = new kakao.maps.CustomOverlay({
        position: position,
        content: content,
        yAnchor: 1
    });

    overlay.setMap(map);

    const info = new kakao.maps.InfoWindow({
        content: makeInfoContent(item)
    });

    function openCase() {
        if (currentInfoWindow) currentInfoWindow.close();
        if (currentCircle) currentCircle.setMap(null);

        currentCircle = new kakao.maps.Circle({
            center: position,
            radius: 35,
            strokeWeight: 2,
            strokeColor: '#ff0000',
            strokeOpacity: 0.9,
            strokeStyle: 'dash',
            fillColor: '#ff0000',
            fillOpacity: 0.12
        });

        currentCircle.setMap(map);
        info.open(map, marker);
        currentInfoWindow = info;

        map.setLevel(2);
        map.panTo(position);
    }

    content.onclick = openCase;
    listItem.onclick = openCase;
}

function handleItem(item, index) {
    const listItem = createListItem(item, index);

    const lat = parseFloat(item["위도"]);
    const lng = parseFloat(item["경도"]);

    if (!isNaN(lat) && !isNaN(lng)) {
        addMapObject(item, new kakao.maps.LatLng(lat, lng), listItem);
    }
}

fetch('./real_estate_data.csv')
.then(r => r.text())
.then(text => {
    const data = parseCSV(text);
    data.forEach(handleItem);
});
</script>
</body>
</html>
